<p-menubar styleClass="layout-topbar">
  <ng-template pTemplate="start">
    <div class="flex items-center">
      @if (isAuthenticated()) {
        <p-button
          icon="pi pi-bars"
          [text]="true"
          [rounded]="true"
          (onClick)="onMenuToggle($event)"
          pTooltip="Toggle menu"
        />
      }
      <span class="px-4 font-semibold">Marathon Bib Expo</span>
    </div>
  </ng-template>

  <ng-template pTemplate="end">
    <div class="flex items-center gap-2 pr-4">
      <!-- Dark Mode Toggle -->
      <p-button
        [icon]="layoutService.isDarkTheme() ? 'pi pi-moon' : 'pi pi-sun'"
        [rounded]="true"
        [text]="true"
        (onClick)="layoutService.toggleDarkMode()"
        [pTooltip]="layoutService.isDarkTheme() ? 'Switch to light mode' : 'Switch to dark mode'"
      />

      <!-- Theme Configurator (only for logged in users) -->
      @if (isAuthenticated()) {
        <p-button
          icon="pi pi-palette"
          [rounded]="true"
          [text]="true"
          (onClick)="themePopover.toggle($event)"
          pTooltip="Theme settings"
        />
        <p-popover #themePopover>
          <app-theme-configurator />
        </p-popover>
      }

      <!-- User Avatar Menu -->
      <p-avatar
        label="U"
        shape="circle"
        size="normal"
        styleClass="cursor-pointer"
        (click)="menu.toggle($event)"
      ></p-avatar>
      <p-menu #menu [model]="items" popup="true"></p-menu>
    </div>
  </ng-template>
</p-menubar>
