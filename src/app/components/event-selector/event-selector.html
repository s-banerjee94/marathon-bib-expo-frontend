@if (showFloatLabel) {
  <p-floatlabel variant="on">
    <p-autocomplete
      (completeMethod)="onEventSearch($event)"
      (onClear)="onEventClear()"
      (onSelect)="onEventSelect($event)"
      [(ngModel)]="selectedEvent"
      [delay]="autocompleteDelay"
      [disabled]="disabled"
      [dropdown]="true"
      [fluid]="fluid"
      [forceSelection]="true"
      [inputId]="inputId"
      [name]="inputId"
      [placeholder]="placeholder"
      [required]="required"
      [showClear]="true"
      [size]="size"
      [styleClass]="styleClass"
      [suggestions]="eventSuggestions()"
      emptyMessage="No events found. Try a different search term."
      optionLabel="eventName"
      scrollHeight="300px"
    >
      <ng-template let-event pTemplate="item">
        <div class="flex w-full items-center gap-3 py-1">
          @if (event.logoUrl) {
            <p-avatar [image]="event.logoUrl" shape="circle" />
          } @else {
            <p-avatar [label]="getInitials(event.eventName)" shape="circle" />
          }
          <div class="flex flex-col flex-1 min-w-0">
            <div class="flex items-center justify-between gap-2">
              <span
                [innerHTML]="event.eventName | highlight: currentSearchTerm()"
                class="font-semibold truncate"
              ></span>
              <p-tag
                [severity]="getStatusSeverity(event.status)"
                [value]="event.status"
                styleClass="text-xs shrink-0"
              />
            </div>
            <span
              [innerHTML]="event.venueName | highlight: currentSearchTerm()"
              class="text-sm"
            ></span>
            @if (event.eventStartDate) {
              <span class="text-xs">{{ event.eventStartDate | date: 'MMM d, yyyy' }}</span>
            }
          </div>
        </div>
      </ng-template>
    </p-autocomplete>
    <label [for]="inputId">{{ label }}</label>
  </p-floatlabel>
} @else {
  <p-autocomplete
    (completeMethod)="onEventSearch($event)"
    (onClear)="onEventClear()"
    (onSelect)="onEventSelect($event)"
    [(ngModel)]="selectedEvent"
    [delay]="autocompleteDelay"
    [disabled]="disabled"
    [dropdown]="true"
    [fluid]="fluid"
    [forceSelection]="true"
    [inputId]="inputId"
    [name]="inputId"
    [placeholder]="placeholder"
    [required]="required"
    [showClear]="true"
    [size]="size"
    [styleClass]="styleClass"
    [suggestions]="eventSuggestions()"
    emptyMessage="No events found. Try a different search term."
    optionLabel="eventName"
    scrollHeight="300px"
  >
    <ng-template let-event pTemplate="item">
      <div class="flex w-full items-center gap-3 py-1">
        @if (event.logoUrl) {
          <p-avatar [image]="event.logoUrl" shape="circle" />
        } @else {
          <p-avatar [label]="getInitials(event.eventName)" shape="circle" />
        }
        <div class="flex flex-col flex-1 min-w-0">
          <div class="flex items-center justify-between gap-2">
            <span
              [innerHTML]="event.eventName | highlight: currentSearchTerm()"
              class="font-semibold truncate"
            ></span>
            <p-tag
              [severity]="getStatusSeverity(event.status)"
              [value]="event.status"
              styleClass="text-xs shrink-0"
            />
          </div>
          <span
            [innerHTML]="event.venueName | highlight: currentSearchTerm()"
            class="text-sm"
          ></span>
          @if (event.eventStartDate) {
            <span class="text-xs">{{ event.eventStartDate | date: 'MMM d, yyyy' }}</span>
          }
        </div>
      </div>
    </ng-template>
  </p-autocomplete>
}

<!-- Error message projection slot -->
<ng-content select="[error]"></ng-content>
