<div class="min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <p-card>
      <ng-template pTemplate="header">
        <div class="text-center pt-6 px-6">
          <h1 class="text-3xl font-bold m-0 mb-2">Marathon Bib Expo</h1>
          <p class="text-base m-0 opacity-70">Sign in to your account</p>
        </div>
      </ng-template>

      <ng-template pTemplate="content">
        @if (errorMessage()) {
          <p-message severity="error" styleClass="w-full mb-4">
            {{ errorMessage() }}
          </p-message>
        }

        <form #loginForm="ngForm" (ngSubmit)="onLogin()" class="flex flex-col gap-2" novalidate>
          <div class="flex flex-col gap-1">
            <label class="font-semibold" for="username">Username</label>
            <input
              #usernameField="ngModel"
              (ngModelChange)="username.set($event)"
              [ngModel]="username()"
              fluid="true"
              id="username"
              name="username"
              pInputText
              placeholder="Enter your username"
              required
            />
            @if (usernameField.invalid && (usernameField.touched || loginForm.submitted)) {
              <p-message [size]="inputSize" severity="error" variant="simple"
                >Username is required.
              </p-message>
            }
          </div>

          <div class="flex flex-col gap-1">
            <label class="font-semibold" for="password">Password</label>
            <p-password
              #passwordField="ngModel"
              (ngModelChange)="password.set($event)"
              [feedback]="false"
              [ngModel]="password()"
              [toggleMask]="true"
              fluid="true"
              inputId="password"
              name="password"
              placeholder="Enter your password"
              required
            ></p-password>
            @if (passwordField.invalid && (passwordField.touched || loginForm.submitted)) {
              <p-message [size]="inputSize" severity="error" variant="simple"
                >Password is required.
              </p-message>
            }
          </div>

          <p-button
            [disabled]="!isFormValid() || isLoading()"
            [label]="isLoading() ? 'Logging in...' : 'Login'"
            [loading]="isLoading()"
            styleClass="w-full mt-2"
            type="submit"
          ></p-button>
        </form>
      </ng-template>
    </p-card>
  </div>
</div>
