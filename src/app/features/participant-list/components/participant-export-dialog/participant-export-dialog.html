<p-dialog
  header="Select Columns to Export"
  [(visible)]="visible"
  [modal]="true"
  [closable]="!isExporting()"
  [closeOnEscape]="!isExporting()"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '95vw', maxWidth: '500px' }"
  (onShow)="onShow()"
>
  <div class="space-y-4">
    <p>Select which columns you want to include in the exported CSV file.</p>

    <div class="border rounded p-4">
      <label class="block text-sm font-medium mb-2"> Columns to Export * </label>
      <p-multiselect
        [(ngModel)]="selectedColumns"
        [options]="allColumns()"
        optionLabel="header"
        placeholder="Select columns..."
        [style]="{ width: '100%' }"
        [maxSelectedLabels]="3"
        selectedItemsLabel="{0} columns selected"
      ></p-multiselect>
      <p class="text-xs mt-2">Selected: {{ selectedColumns().length }} column(s)</p>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <p-button
      label="Cancel"
      icon="pi pi-times"
      (onClick)="close()"
      [disabled]="isExporting()"
      severity="secondary"
      [outlined]="true"
    ></p-button>
    <p-button
      label="Export"
      [icon]="isExporting() ? 'pi pi-spin pi-spinner' : 'pi pi-download'"
      (onClick)="confirm()"
      [disabled]="isExporting() || selectedColumns().length === 0"
      severity="success"
    ></p-button>
  </ng-template>
</p-dialog>
